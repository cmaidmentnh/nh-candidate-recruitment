{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center" style="margin-top: 8vh;">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <img src="{{ url_for('static', filename='images/ctehr-logo-white.png') }}" alt="Committee to Elect House Republicans" style="max-width: 260px; background: linear-gradient(135deg, #d91720 0%, #b8141b 100%); padding: 18px 24px; border-radius: 12px; box-shadow: 0 4px 16px rgba(217,23,32,0.3);" class="mb-3">
      <p class="text-muted mb-0" style="font-size: 13px; letter-spacing: 1px; text-transform: uppercase; font-weight: 600;">Candidate Tracker</p>
    </div>
    <div class="card" style="border: none; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-radius: 12px;">
      <div class="card-body p-4">
        <h5 class="mb-4" style="font-weight: 700; font-size: 18px;">Sign In</h5>
        <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <div class="form-group">
            <label style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d;">Email</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus style="padding: 12px 14px;">
          </div>
          <div class="form-group">
            <label style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d;">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Your password" required style="padding: 12px 14px;">
          </div>
          <button type="submit" class="btn btn-primary btn-block" style="padding: 12px; font-weight: 600; font-size: 15px;">
            Sign In
          </button>
        </form>
        <div class="text-center my-3" style="font-size: 12px; color: #adb5bd; letter-spacing: 1px;">— OR —</div>
        <a href="{{ url_for('google_oauth_start', next=request.args.get('next', ''), type='candidate') }}"
           class="btn btn-block d-flex align-items-center justify-content-center"
           style="background: #fff; border: 1px solid #dadce0; padding: 11px; font-weight: 500; color: #3c4043;">
          <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right: 10px;">
            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.49h4.84a4.14 4.14 0 0 1-1.79 2.71v2.26h2.91c1.7-1.57 2.68-3.88 2.68-6.62z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.91-2.26c-.8.54-1.83.86-3.05.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.33A9 9 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.97 10.71A5.41 5.41 0 0 1 3.68 9c0-.59.1-1.17.29-1.71V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l3.01-2.33z"/>
            <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.59C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.96L3.97 7.3C4.68 5.16 6.66 3.58 9 3.58z"/>
          </svg>
          Sign in with Google
        </a>
        <div class="text-center mt-3">
          <a href="{{ url_for('forgot_password') }}" class="text-muted" style="font-size: 13px;">Forgot your password?</a>
        </div>
      </div>
    </div>
    <p class="text-center text-muted mt-4" style="font-size: 12px;">
      Need an account? Contact your administrator.
    </p>
  </div>
</div>
{% endblock %}
